# CI — the "robot" that checks every change before it counts.
# Runs automatically on every Pull Request and every push to develop.
# Green check = safe to merge. Red X = something's broken (it tells you what).
name: CI

on:
  pull_request:
  push:
    branches: [develop]
  workflow_dispatch: {}

jobs:
  build-and-test:
    name: Build & test (Java 21 / Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile, run tests, package
        run: ./mvnw -B -ntp verify
