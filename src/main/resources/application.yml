server:
  # Render injects PORT at runtime; 8083 is the local default (engine uses 8080)
  port: ${PORT:8083}

spring:
  application:
    name: luke-auth-engine
  servlet:
    multipart:
      # This service is a PURE reverse proxy — it must NEVER parse request bodies. Spring's default
      # multipart resolver eagerly parses multipart uploads (resolve-lazily=false), which consumes the
      # input stream BEFORE the proxy controller forwards it — so a file upload reaches the engine /
      # file-proxy as an EMPTY multipart (→ 400 "file is required"). Disabling it leaves the body as a
      # raw stream that forwards verbatim (Content-Type + boundary preserved).
      enabled: false

luke:
  auth:
    # ── Upstream engine the gateway proxies to ──────────────────────────────
    # Capability was merged into core-engine, so /api/my-capabilities and every
    # other /api/** route are served here (no separate capability backend).
    core-engine:
      base-url: ${CORE_ENGINE_URL:http://localhost:8080}

    # ── DOCUMENTS byte tier (luke-file-proxy) ───────────────────────────────
    # When set, /api/documents/** is routed HERE (upload→S3, /content←S3) instead of
    # core, and the gateway injects the vouched X-User-Id (the proxy reads headers,
    # not the act-as JWT). Blank (local default) → documents fall through to core unchanged.
    file-proxy:
      base-url: ${FILE_PROXY_URL:}

    # ── Rate limiting (credential / token endpoints) ────────────────────────
    # Per client IP + path fixed window over /auth/login,/auth/register,
    # /auth/password,/service/token. In-memory (per instance). Conservative default.
    ratelimit:
      max-requests: ${AUTH_RATELIMIT_MAX:10}
      window-seconds: ${AUTH_RATELIMIT_WINDOW_SECONDS:60}
      max-keys: ${AUTH_RATELIMIT_MAX_KEYS:50000}

    # ── /session translator ─────────────────────────────────────────────────
    # dev-mode allows an X-Dev-User header / /dev/token to stand in for a verified
    # login — LOCAL TESTING ONLY; never enable in shared/prod environments. It also
    # REQUIRES the 'dev' Spring profile (SPRING_PROFILES_ACTIVE=dev): the app fails to
    # boot if dev-mode is on without it, so one env var can't open the backdoors in
    # prod. See DevModeGuard.
    dev-mode: ${LUKE_AUTH_DEV_MODE:false}
    session:
      cache-ttl-seconds: ${SESSION_CACHE_TTL:60}

    # ── Service accounts (robots, no WorkOS) ────────────────────────────────
    # Comma-separated key=userId pairs. A service POSTs /service/token with
    # X-Service-Key and gets an act-as token for its userId (which must be
    # provisioned in the engine like a human). e.g.
    #   LUKE_AUTH_SERVICE_KEYS=s3cret1=svc:order-bot,s3cret2=svc:billing
    # Each key may be stored HASHED at rest (SHA-256 hex; echo -n <key> | sha256sum)
    # and may carry ;exp=<epochSeconds> (self-revokes without redeploy) and ;scope=<csv>
    # (least-privilege metadata, audited on issuance). e.g.
    #   LUKE_AUTH_SERVICE_KEYS=<sha256hex>=svc:order-bot;exp=1893456000;scope=forms,emails
    # Live revocation (#39): POST /service/keys/{keyId}/revoke with X-Operator-Token takes
    # effect on the next /service/token with NO restart; set the operator-token to enable it
    # (blank ⇒ the revoke endpoint is disabled). keyId is the non-secret 8-char label in the
    # audit trail. Secret-manager sourcing: supply a ServiceKeyRegistry.SecretSource bean to
    # read the key material from AWS Secrets Manager / Vault instead of this env var.
    service:
      keys: ${LUKE_AUTH_SERVICE_KEYS:}
      operator-token: ${LUKE_AUTH_SERVICE_OPERATOR_TOKEN:}

    # ── WorkOS (authentication) ─────────────────────────────────────────────
    # luke-auth runs the login flows server-to-server against the WorkOS User
    # Management API and verifies the issued access tokens against WorkOS's JWKS.
    workos:
      # From the WorkOS dashboard → API Keys. The api-key is SECRET.
      client-id: ${WORKOS_CLIENT_ID:}
      api-key: ${WORKOS_API_KEY:}
      api-base-url: ${WORKOS_API_BASE:https://api.workos.com}
      # JWKS for verifying access tokens. Defaults to
      #   <api-base-url>/sso/jwks/<client-id>  when left blank.
      jwks-url: ${WORKOS_JWKS_URL:}
      issuer: ${WORKOS_ISSUER:}
      audience: ${WORKOS_AUDIENCE:}
      # PROD: set true (with issuer + audience above) to REQUIRE issuer/audience
      # validation — missing either then fails closed (rejects all tokens) instead
      # of accepting expiry-only. Left false by default so issuer-less envs keep working.
      strict-validation: ${WORKOS_STRICT_VALIDATION:false}
      # Where WorkOS sends the browser back after social/SSO login. Must be
      # registered in the WorkOS dashboard's redirect URIs.
      redirect-uri: ${WORKOS_REDIRECT_URI:http://localhost:8083/auth/callback}
      # After /auth/callback succeeds, the browser is redirected here with the
      # access token in the URL fragment (the consumer UI's SSO callback page).
      ui-callback-url: ${WORKOS_UI_CALLBACK_URL:http://localhost:5173/sso-callback}
      # Refresh-token cookie attributes. Set cookie-secure=false for local http;
      # use SameSite=None (+ Secure) only if the UI is on a cross-site domain.
      cookie-secure: ${WORKOS_COOKIE_SECURE:true}
      cookie-same-site: ${WORKOS_COOKIE_SAMESITE:Lax}
      # Create users already email-verified, bypassing email-ownership proof. This is
      # a DEV-ONLY shortcut (so headless local sign-up isn't blocked by WorkOS's
      # verified-email requirement). It defaults to false and the app REFUSES TO BOOT
      # with it true unless dev-mode is on — see WorkosClient. In prod, leave it false
      # and let WorkOS-hosted email verification gate password auth.
      mark-email-verified-on-register: ${WORKOS_MARK_EMAIL_VERIFIED:false}

    # ── Self-service provisioning (optional) ────────────────────────────────
    # If set, /auth/register provisions the new user into core-engine via the
    # operator-only /api/admin/onboard-user. Leave default-tenant blank to skip
    # (e.g. when users create their own org after first login).
    onboarding:
      operator-user: ${ONBOARDING_OPERATOR_USER:}
      operator-password: ${ONBOARDING_OPERATOR_PASSWORD:}
      default-tenant: ${ONBOARDING_DEFAULT_TENANT:}
      default-role: ${ONBOARDING_DEFAULT_ROLE:}
      default-access-level: ${ONBOARDING_DEFAULT_ACCESS_LEVEL:READ_WRITE}

    # ── Gateway signing key (the "secret badge") ────────────────────────────
    # PEM-encoded PKCS#8 RSA private key used to sign act-as-user tokens.
    # If unset, an ephemeral keypair is generated at startup (fine for local
    # dev; in prod set GATEWAY_PRIVATE_KEY so restarts don't rotate the key).
    gateway:
      # PEM PKCS#8 RSA private key. If unset, an ephemeral key is generated at
      # startup and the kid is derived from its thumbprint (engine refetches
      # JWKS automatically after a restart). Set this for a stable prod key.
      private-key: ${GATEWAY_PRIVATE_KEY:}
      # PROD: set true to REQUIRE a stable GATEWAY_PRIVATE_KEY — boot fails if it's
      # unset (no ephemeral fallback). Left false so dev/qa can run ephemeral.
      require-stable-key: ${GATEWAY_REQUIRE_STABLE_KEY:false}
      # ROTATION: PEM X.509 public key of the PREVIOUS signing key. When set, it's
      # published in the JWKS alongside the current key so tokens signed by either
      # kid verify during the overlap window — enabling zero-downtime key rotation.
      # See docs/key-rotation.md. Retire (unset) once all old tokens have expired.
      previous-public-key: ${GATEWAY_PREVIOUS_PUBLIC_KEY:}
      issuer: ${GATEWAY_ISSUER:luke-auth-engine}
      audience: ${GATEWAY_AUDIENCE:luke-core-engine}
      # How long an act-as-user token is valid. Short, since it is minted
      # fresh per request, server-to-server.
      ttl-seconds: ${GATEWAY_TTL_SECONDS:60}

  cors:
    # Origin(s) of the consumer UI. Local dev allows any localhost port.
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:*}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  # Tag every log line with the per-request correlation id (CorrelationIdFilter, MDC
  # key 'correlationId'), forwarded to core-engine so a trace spans the gateway hop.
  pattern:
    level: "%5p [cid:%X{correlationId:--}]"
  level:
    root: INFO
    com.luke: DEBUG
    # Dedicated audit trail (#24): privileged/auth events on the 'luke.audit' logger.
    # Keep at INFO so the trail is always emitted; filter the log store by this name.
    luke.audit: INFO
